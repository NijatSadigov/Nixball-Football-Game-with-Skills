# Reverse proxy: nixball.YOURDOMAIN.com -> the NixBall node process on :3001
#
# 1. Replace YOURDOMAIN.com below (2 places incl. this comment block).
# 2. sudo cp deploy/nginx-nixball.conf /etc/nginx/sites-available/nixball
# 3. sudo ln -s /etc/nginx/sites-available/nixball /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. sudo certbot --nginx -d nixball.YOURDOMAIN.com   (adds HTTPS; client then uses wss automatically)

server {
    listen 80;
    listen [::]:80;
    server_name nixball.YOURDOMAIN.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade — required, the game runs over /ws
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # game sockets are long-lived
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
